name: Zone Scanner (Telegram Alerts)

# Ye workflow GitHub ke apne server par chalega - aapka PC/laptop
# band ho tab bhi ye har schedule par khud scan karke Telegram alert bhejega.

on:
  schedule:
    - cron: "*/5 * * * *"   # 🔥 UPDATED: har 5 minute me chalega (15 se kam kiya)
    # - cron: "*/10 * * * *"  # ya 10 minute
    # - cron: "*/15 * * * *"  # ya 15 minute (default)
  workflow_dispatch: {}        # "Actions" tab se manually bhi chala sakte ho

permissions:
  contents: write             # alerted_state.json ko commit karne ke liye zaroori

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests matplotlib

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert_bot.py

      - name: Save alert state (so duplicates don't get re-sent)
        run: |
          git config user.name "zone-scanner-bot"
          git config user.email "actions@github.com"
          git add alerted_state.json
          git diff --cached --quiet || git commit -m "Update alert state [skip ci]"
          git push
