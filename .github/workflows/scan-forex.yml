name: Zone Scanner - Forex + Commodity + Crypto

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests matplotlib

      - name: Run Forex Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_FOREX: ${{ secrets.TELEGRAM_CHAT_ID_FOREX }}
        run: python alert_bot_forex.py

      - name: Save state
        run: |
          git config user.name "zone-scanner-bot"
          git config user.email "actions@github.com"
          
          # 🔥 Check if state file exists
          if [ -f "alert_state_forex.json" ]; then
            echo "📂 State file found, adding..."
            git add -f alert_state_forex.json
          else
            echo "⚠️ State file not found, creating empty..."
            echo "[]" > alert_state_forex.json
            git add -f alert_state_forex.json
          fi
          
          if git diff --cached --quiet; then
            echo "📂 No state changes to commit"
          else
            git commit -m "Update Forex state [skip ci]"
            git pull origin main --rebase || echo "⚠️ Pull failed"
            git push origin main --force || echo "⚠️ Push failed"
            echo "✅ State updated and pushed"
          fi
