name: Zone Scanner - Forex + Commodity + Crypto

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests matplotlib

      - name: Run Forex Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_FOREX: ${{ secrets.TELEGRAM_CHAT_ID_FOREX }}
        run: python alert_bot_forex.py

      - name: Save state
        run: |
          git config user.name "zone-scanner-bot"
          git config.user.email "actions@github.com"
          
          git pull origin main --rebase || echo "⚠️ Pull failed, continuing"
          git add -f alerted_state_forex.json
          
          if git diff --cached --quiet; then
            echo "📂 No state changes to commit"
          else
            git commit -m "Update Forex state [skip ci]"
            git push origin main --force-with-lease || echo "⚠️ Push failed"
            echo "✅ State updated and pushed"
          fi
