name: Zone Scanner - India (NIFTY 200)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests matplotlib

      - name: Run India Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_INDIA: ${{ secrets.TELEGRAM_CHAT_ID_INDIA }}
        run: python alert_bot_india.py

      - name: Save state
        run: |
          git config user.name "zone-scanner-bot"
          git config user.email "actions@github.com"
          
          # 🔥 Force pull before adding
          git pull origin main --rebase || echo "⚠️ Pull failed, continuing"
          
          git add alerted_state_india.json -f
          
          if git diff --cached --quiet; then
            echo "📂 No state changes to commit"
          else
            git commit -m "Update India state [skip ci]"
            git pull origin main --rebase || echo "⚠️ Pull failed"
            git push origin main || echo "⚠️ Push failed"
            echo "✅ State updated and pushed"
          fi
